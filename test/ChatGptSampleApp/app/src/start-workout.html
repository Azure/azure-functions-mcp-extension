<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="./styles/start-workout.css">
</head>
<body>
    <div class="container">
        <!-- Templates Selection View -->
        <div id="templates-view" class="hidden">
            <div class="carousel-wrapper">
                <div id="templates-container" class="carousel"></div>
            </div>
        </div>

        <!-- Active Workout View -->
        <div id="workout-view" class="hidden">
            <div id="workout-container"></div>
        </div>

        <!-- Completion View -->
        <div id="complete-view" class="hidden">
            <div id="complete-container"></div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script type="module" src="./start-workout.ts"></script>
</body>
</html>
