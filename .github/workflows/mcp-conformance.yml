name: MCP Conformance

# Runs the Model Context Protocol conformance suite
# (https://github.com/modelcontextprotocol/conformance) against a real
# Azure Functions host loaded with this extension. We boot the isolated
# worker test app under Core Tools, then point the conformance runner at
# the Streamable HTTP endpoint exposed by the extension.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Catch upstream conformance / SDK drift even without code changes.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  conformance:
    name: Server conformance (ConformanceTestApp)
    runs-on: ubuntu-latest

    env:
      CONFIGURATION: Release
      TEST_APP: ConformanceTestApp
      MCP_URL: http://localhost:7071/runtime/webhooks/mcp
      AzureWebJobsStorage: UseDevelopmentStorage=true
      FUNCTIONS_WORKER_RUNTIME: dotnet-isolated

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Azurite (storage emulator)
        run: npm install -g azurite

      - name: Start Azurite
        run: |
          mkdir -p "$RUNNER_TEMP/azurite"
          nohup azurite --silent --location "$RUNNER_TEMP/azurite" --debug "$RUNNER_TEMP/azurite/debug.log" >/dev/null 2>&1 &
          # Wait for the blob endpoint to accept connections.
          timeout 30 bash -c 'until curl -fsS -o /dev/null http://127.0.0.1:10000/ || [ $? -eq 22 ]; do sleep 1; done'

      - name: Install Azure Functions Core Tools v4
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Build test app
        run: |
          # The test app's worker SDK generates a WorkerExtensions
          # project that references the host extension by ProjectReference,
          # but its restore happens after the test app's own restore. Pre-
          # restoring the host extension ensures the assets file exists by
          # the time the WorkerExtensions build kicks in.
          dotnet restore src/Microsoft.Azure.Functions.Extensions.Mcp/Extensions.Mcp.csproj
          dotnet build "test/${TEST_APP}/${TEST_APP}.csproj" -c "$CONFIGURATION"

      - name: Locate built host.json
        id: locate
        run: |
          host_json="$(find "out/bin/${TEST_APP}" -iname host.json -print -quit)"
          if [ -z "$host_json" ]; then
            echo "::error::Could not find built host.json for ${TEST_APP}."
            echo "----- out/bin contents -----"
            ls -R "out/bin" || true
            exit 1
          fi
          app_dir="$(dirname "$host_json")"
          echo "Using app dir: $app_dir"
          echo "app_dir=$app_dir" >> "$GITHUB_OUTPUT"

      - name: Start Functions host
        run: |
          cd "${{ steps.locate.outputs.app_dir }}"
          nohup func start --port 7071 --verbose > "$RUNNER_TEMP/func-host.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/func-host.pid"

      - name: Wait for host readiness
        run: |
          # The MCP endpoint accepts POST; a GET returns a 4xx once the host
          # is listening, which is good enough as a readiness signal.
          for i in $(seq 1 60); do
            if curl -fsS -o /dev/null -w '%{http_code}' "$MCP_URL" | grep -Eq '^[0-9]+$'; then
              echo "Host is responding."
              exit 0
            fi
            sleep 2
          done
          echo "::error::Functions host did not become ready in time."
          echo "----- func-host.log -----"
          cat "$RUNNER_TEMP/func-host.log" || true
          exit 1

      - name: Run MCP conformance (server mode)
        id: conformance
        run: |
          set -o pipefail
          mkdir -p "$RUNNER_TEMP/conformance-out"
          npx --yes @modelcontextprotocol/conformance@0.1.16 server \
            --url "$MCP_URL" \
            --suite active \
            --expected-failures ./eng/conformance/conformance-baseline.yml \
            -o "$RUNNER_TEMP/conformance-out" \
            2>&1 | tee "$RUNNER_TEMP/conformance-out/console.log"

      - name: Generate conformance summary
        if: always()
        id: summary
        run: |
          log="$RUNNER_TEMP/conformance-out/console.log"
          summary="$RUNNER_TEMP/conformance-summary.md"

          # Extract protocol version from the running host (with retries)
          protocol_version="unknown"
          for attempt in 1 2 3; do
            response=$(curl -sS --max-time 5 -X POST "$MCP_URL" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{
                "jsonrpc": "2.0",
                "id": 1,
                "method": "initialize",
                "params": {
                  "protocolVersion": "2025-06-18",
                  "capabilities": {},
                  "clientInfo": { "name": "conformance-ci", "version": "1.0.0" }
                }
              }' 2>/dev/null) && {
              # Response may be SSE-formatted (data: ...) or raw JSON
              json=$(echo "$response" | sed -n 's/^data: //p' | head -1)
              [ -z "$json" ] && json="$response"
              version=$(echo "$json" | node -e "
                const chunks = [];
                process.stdin.on('data', c => chunks.push(c));
                process.stdin.on('end', () => {
                  try {
                    const obj = JSON.parse(chunks.join(''));
                    console.log(obj.result?.protocolVersion || 'unknown');
                  } catch { console.log('unknown'); }
                });
              ")
              if [ "$version" != "unknown" ] && [ -n "$version" ]; then
                protocol_version="$version"
                break
              fi
            }
            sleep 2
          done
          echo "Protocol version: $protocol_version"
          echo "protocol_version=$protocol_version" >> "$GITHUB_OUTPUT"

          # Header
          echo "## MCP Conformance Results" > "$summary"
          echo "" >> "$summary"

          if [ "$protocol_version" != "unknown" ]; then
            echo "**MCP Protocol Version:** \`${protocol_version}\`" >> "$summary"
            echo "" >> "$summary"
          fi

          if [ ! -f "$log" ]; then
            echo "⚠️ No conformance output found — the runner may not have started." >> "$summary"
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Extract the totals line (e.g. "Total: 24 passed, 8 failed")
          totals=$(grep -oP 'Total: \d+ passed, \d+ failed' "$log" || echo "")
          passed=$(echo "$totals" | grep -oP '\d+ passed' | grep -oP '\d+' || echo "0")
          failed=$(echo "$totals" | grep -oP '\d+ failed' | grep -oP '\d+' || echo "0")
          total=$((passed + failed))

          # Check baseline result
          if grep -q "Baseline check passed" "$log"; then
            baseline_ok=true
          else
            baseline_ok=false
          fi

          # Status badge
          if [ "$baseline_ok" = true ]; then
            echo "✅ **Baseline check passed** — all failures are expected." >> "$summary"
          else
            echo "❌ **Baseline check failed** — see details below." >> "$summary"
          fi
          echo "" >> "$summary"
          echo "**${passed}** passed, **${failed}** failed out of **${total}** scenarios" >> "$summary"
          echo "" >> "$summary"

          # Build scenario table
          echo "### Scenario Results" >> "$summary"
          echo "" >> "$summary"
          echo "| Status | Scenario | Detail |" >> "$summary"
          echo "| --- | --- | --- |" >> "$summary"

          # Parse per-scenario lines: ✓ or ✗ scenario-name: X passed, Y failed
          # Also build the expected doc table for drift detection
          doc_table="$RUNNER_TEMP/conformance-doc-table.md"
          echo "| Status | Scenario | Detail |" > "$doc_table"
          echo "| --- | --- | --- |" >> "$doc_table"

          grep -E '^[✓✗]' "$log" | while IFS= read -r line; do
            if echo "$line" | grep -q '^✓'; then
              icon="✅"
            else
              icon="❌"
            fi
            scenario=$(echo "$line" | sed -E 's/^[✓✗] ([^:]+):.*/\1/')
            detail=$(echo "$line" | sed -E 's/^[✓✗] [^:]+: (.*)/\1/')
            echo "| $icon | \`$scenario\` | $detail |" >> "$summary"
            echo "| $icon | \`$scenario\` | $detail |" >> "$doc_table"
          done

          echo "" >> "$summary"

          # List expected failures
          expected=$(grep -A 100 'Expected failures' "$log" | grep '^ *~' | sed 's/^ *~ *//' || echo "")
          if [ -n "$expected" ]; then
            echo "<details><summary>Expected failures (in baseline)</summary>" >> "$summary"
            echo "" >> "$summary"
            echo "$expected" | while IFS= read -r ef; do
              echo "- \`$ef\`" >> "$summary"
            done
            echo "" >> "$summary"
            echo "These scenarios are tracked in [\`eng/conformance/conformance-baseline.yml\`](../blob/${{ github.sha }}/eng/conformance/conformance-baseline.yml)." >> "$summary"
            echo "</details>" >> "$summary"
          fi

          # Unexpected failures
          unexpected=$(grep -A 100 'Unexpected failures' "$log" | grep '^ *!' | sed 's/^ *! *//' || echo "")
          if [ -n "$unexpected" ]; then
            echo "" >> "$summary"
            echo "### 🚨 Unexpected failures (regressions)" >> "$summary"
            echo "" >> "$summary"
            echo "$unexpected" | while IFS= read -r uf; do
              echo "- \`$uf\`" >> "$summary"
            done
          fi

          # Newly passing (stale baseline entries)
          newly_passing=$(grep -A 100 'Newly passing' "$log" | grep '^ *+' | sed 's/^ *+ *//' || echo "")
          if [ -n "$newly_passing" ]; then
            echo "" >> "$summary"
            echo "### 🎉 Newly passing (remove from baseline)" >> "$summary"
            echo "" >> "$summary"
            echo "$newly_passing" | while IFS= read -r np; do
              echo "- \`$np\`" >> "$summary"
            done
          fi

          # Write to job summary
          cat "$summary" >> "$GITHUB_STEP_SUMMARY"

      - name: Check docs drift
        if: always()
        id: drift
        run: |
          doc="docs/protocol-conformance.md"
          expected_table="$RUNNER_TEMP/conformance-doc-table.md"
          drift=false

          if [ ! -f "$expected_table" ]; then
            echo "drift=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check protocol version drift
          protocol_version="${{ steps.summary.outputs.protocol_version }}"
          if [ -n "$protocol_version" ] && [ "$protocol_version" != "unknown" ]; then
            doc_version=$(grep -oP '(?<=conformance-protocol-version: )\S+' "$doc" || echo "")
            if [ "$doc_version" != "$protocol_version" ]; then
              drift=true
              echo "::warning::Protocol version in docs ($doc_version) does not match server ($protocol_version)."
            fi
          fi

          # Check scenario table drift
          checked_in=$(sed -n '/<!-- conformance-table-start -->/,/<!-- conformance-table-end -->/p' "$doc" \
            | grep -E '^\|' || echo "")
          expected=$(cat "$expected_table")

          if [ "$checked_in" != "$expected" ]; then
            drift=true
            echo "::warning::Scenario table in docs/protocol-conformance.md is out of date."
          fi

          echo "drift=$drift" >> "$GITHUB_OUTPUT"

          if [ "$drift" = true ]; then
            {
              echo ""
              echo "---"
              echo "### 📝 Documentation drift detected"
              echo ""
              echo "\`docs/protocol-conformance.md\` does not match the conformance results."
              echo "Update the protocol version and/or the scenario table between the"
              echo "\`<!-- conformance-table-start -->\` and \`<!-- conformance-table-end -->\`"
              echo "markers to match the results above."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary="$RUNNER_TEMP/conformance-summary.md"
          if [ ! -f "$summary" ]; then
            exit 0
          fi

          # Append drift warning if detected
          if [ "${{ steps.drift.outputs.drift }}" = "true" ]; then
            {
              echo ""
              echo "---"
              echo "### 📝 Documentation drift detected"
              echo ""
              echo "The conformance results table in \`docs/protocol-conformance.md\` does not"
              echo "match these results. Please update the table between the"
              echo "\`<!-- conformance-table-start -->\` and \`<!-- conformance-table-end -->\`"
              echo "markers to match the scenario results above."
            } >> "$summary"
          fi

          # Add a marker so we can find and update this comment on re-runs
          marker="<!-- mcp-conformance-bot -->"
          body="${marker}
          $(cat "$summary")"

          # Try to update an existing comment, otherwise create a new one
          existing=$(gh api \
            "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" \
            2>/dev/null | head -1)

          if [ -n "$existing" ]; then
            gh api \
              "repos/${{ github.repository }}/issues/comments/${existing}" \
              -X PATCH -f body="$body" --silent
          else
            gh pr comment "${{ github.event.pull_request.number }}" --body "$body"
          fi

      - name: Upload conformance reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-reports
          path: ${{ runner.temp }}/conformance-out
          if-no-files-found: ignore

      - name: Stop Functions host
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/func-host.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/func-host.pid")" 2>/dev/null || true
          fi

      - name: Upload host log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: func-host-log
          path: ${{ runner.temp }}/func-host.log
          if-no-files-found: ignore
